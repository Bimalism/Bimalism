<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Bimalism News — World, State, Local, Sports & More</title>
<meta name="description" content="Bimalism News — clean, fast, modern news reader. World, State (all India), Local (Tamil Nadu / Karaikal), sports, tech and more." />
<meta name="theme-color" content="#0b1220" />
<link rel="icon" href="https://api.iconify.design/mdi/newspaper-variant.svg?color=%233b82f6" />

<style>
:root{
  --bg:#0b1220; --panel:#0f172a; --panel-2:#111c33; --line:#1f2a44;
  --text:#e6edf7; --muted:#93a2bd; --accent:#3b82f6; --accent-2:#22d3ee;
  --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  --maxw:1200px;
  --cat: var(--accent);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

.bn-header{position:sticky;top:0;z-index:20;background:rgba(11,18,32,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bn-header-in{max-width:var(--maxw);margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bn-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
.bn-logo-dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 12px rgba(59,130,246,.6)}
.bn-search{flex:1;min-width:200px;display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px}
.bn-search input{flex:1;background:transparent;border:0;outline:0;color:var(--text);padding:6px 8px;font-size:14px}
.bn-country{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:8px 12px;font-size:13px}
.bn-install{background:var(--accent);color:#fff;border-radius:999px;padding:8px 14px;font-weight:600;display:none}
.bn-install.show{display:inline-block}

.bn-nav{max-width:var(--maxw);margin:0 auto;padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.bn-nav::-webkit-scrollbar{display:none}
.bn-chip{white-space:nowrap;padding:8px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:500}
.bn-chip.active{background:var(--cat);color:#fff;border-color:transparent}

.bn-ticker{background:var(--panel-2);border-block:1px solid var(--line);overflow:hidden;position:relative}
.bn-ticker-in{display:flex;gap:40px;padding:10px 16px;animation:bn-ticker 60s linear infinite;white-space:nowrap}
.bn-ticker button{color:var(--muted);font-size:13px;padding:0}
.bn-ticker button:hover{color:var(--text)}
.bn-ticker b{color:var(--accent);margin-right:6px}
@keyframes bn-ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.bn-main{max-width:var(--maxw);margin:0 auto;padding:20px 16px}
.bn-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.bn-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .2s;cursor:pointer;position:relative}
.bn-card:hover{transform:translateY(-2px);border-color:var(--cat)}
.bn-card-img{aspect-ratio:16/10;background:var(--panel-2);object-fit:cover}
.bn-card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.bn-card-cat{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--cat)}
.bn-card-title{font-size:16px;font-weight:700;line-height:1.35;margin:0;padding-right:30px}
.bn-card-desc{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bn-card-meta{margin-top:auto;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}

.bn-card-bookmark{position:absolute;top:12px;right:12px;background:rgba(11,18,32,0.8);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);z-index:2}
.bn-card-bookmark.active{color:var(--warn)}

.bn-featured{grid-column:1/-1;display:grid;grid-template-columns:1.4fr 1fr;gap:0;min-height:320px}
.bn-featured .bn-card-img{aspect-ratio:auto;height:100%}
@media(max-width:700px){.bn-featured{grid-template-columns:1fr}.bn-featured .bn-card-img{aspect-ratio:16/10;height:auto}}

.bn-skel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;height:340px}
.bn-skel::before{content:"";display:block;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:bn-shim 1.4s infinite}
@keyframes bn-shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

.bn-status{padding:40px 20px;text-align:center;color:var(--muted)}
.bn-status button{margin-top:12px;padding:8px 18px;border-radius:999px;background:var(--accent);color:#fff;font-weight:600}

.bn-modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.75);display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.bn-modal.show{display:flex}
.bn-modal-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);max-width:800px;width:100%;overflow:hidden;margin:20px auto}
.bn-modal-box img{aspect-ratio:16/9;object-fit:cover;width:100%}
.bn-modal-body{padding:24px}
.bn-modal-body h2{margin:0 0 8px;font-size:22px}
.bn-modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.bn-modal-actions a,.bn-modal-actions button{padding:10px 18px;border-radius:999px;font-weight:600;font-size:14px}
.bn-btn-primary{background:var(--accent);color:#fff}
.bn-btn-ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--text)}
.bn-btn-share{background:var(--ok);color:#fff}
.bn-btn-bookmark{background:var(--warn);color:#111}

.bn-footer{text-align:center;padding:30px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);margin-top:40px}
</style>
</head>
<body>

<header class="bn-header">
  <div class="bn-header-in">
    <div class="bn-logo"><span class="bn-logo-dot"></span> Bimalism News</div>
    <div class="bn-search">
      <input id="bn-q" type="search" placeholder="Search headlines…" />
    </div>
    <select id="bn-country" class="bn-country" aria-label="Country">
      <option value="us">🇺🇸 US</option>
      <option value="in" selected>🇮🇳 India</option>
      <option value="gb">🇬🇧 UK</option>
    </select>
    <button id="bn-install" class="bn-install">Install App</button>
  </div>
  <nav id="bn-nav" class="bn-nav"></nav>
</header>

<div id="bn-ticker" class="bn-ticker"></div>

<main class="bn-main">
  <div id="bn-root" class="bn-grid"></div>
</main>

<div id="bn-modal" class="bn-modal" role="dialog" aria-modal="true"></div>

<footer class="bn-footer">
  © <span id="bn-year"></span> Bimalism News
</footer>

<script>
const CATEGORIES = [
  {id:"top",label:"Top",color:"#3b82f6"},{id:"world",label:"World",color:"#8b5cf6"},
  {id:"state",label:"State",color:"#14b8a6"},{id:"local",label:"Local",color:"#f59e0b"},
  {id:"business",label:"Business",color:"#10b981"},{id:"tech",label:"Tech",color:"#06b6d4"},
  {id:"science",label:"Science",color:"#a855f7"},{id:"health",label:"Health",color:"#ef4444"},
  {id:"sports",label:"Sports",color:"#f97316"},{id:"culture",label:"Culture",color:"#ec4899"}
];

const state = {
  category: "top", country: "in", query: "", articles: [], loading: false, error: "",
  bookmarks: JSON.parse(localStorage.getItem('bimalism_bookmarks') || '[]')
};

const PROXY_URL = "https://your-cloudflare-worker-url.workers.dev"; 

const $ = (s,r=document)=>r.querySelector(s);
const el = (tag, p={}, ...c) => {
  const n = document.createElement(tag);
  for(const k in p){ if(k==="class") n.className=p[k]; else if(k.startsWith("on")) n.addEventListener(k.slice(2), p[k]); else n.setAttribute(k, p[k]); }
  for(const x of c) n.append(x.nodeType?x:document.createTextNode(x));
  return n;
};
const fallbackImg = (seed)=>`https://picsum.photos/seed/${encodeURIComponent(seed||"bn")}/1200/800`;
const timeAgo = (iso) => {
  const d = (Date.now()-new Date(iso).getTime())/1000;
  if(d<60) return "just now"; if(d<3600) return Math.floor(d/60)+"m ago";
  if(d<86400) return Math.floor(d/3600)+"h ago"; return Math.floor(d/86400)+"d ago";
};

function toggleBookmark(a){
  const idx = state.bookmarks.findIndex(b => b.url === a.url);
  idx > -1 ? state.bookmarks.splice(idx, 1) : state.bookmarks.push(a);
  localStorage.setItem('bimalism_bookmarks', JSON.stringify(state.bookmarks));
  render();
}

async function shareArticle(a){
  if (navigator.share) {
    try { await navigator.share({title:a.title,text:a.description,url:a.url}); } catch(e){}
  } else {
    try { await navigator.clipboard.writeText(a.url); alert("Link copied!"); } catch(e){ alert("Copy this link: " + a.url); }
  }
}

async function load(force=false) {
  const key = state.category+"|"+state.country;
  if(!force && state.cache && state.cache[key]){ state.articles = state.cache[key]; state.error=""; render(); return; }
  state.loading = true; state.error=""; render();
  try {
    const r = await fetch(`${PROXY_URL}/latest-news?language=en&country=${state.country}&category=${state.category}`);
    if(!r.ok) throw new Error("API "+r.status);
    const j = await r.json();
    state.articles = j.news.map((a,i)=>({
      id: a.url||(state.category+"-"+i), title: a.title||"Untitled",
      description: a.description||"", content: a.description||"",
      image: a.image||fallbackImg(a.title||i), source: a.author||a.source||"Unknown",
      publishedAt: a.published, url: a.url,
    }));
    if(!state.cache) state.cache = {};
    state.cache[key] = state.articles;
    state.loading = false; state.error = state.articles.length ? "" : "No stories found";
    render();
  } catch(e) {
    state.loading = false; state.error = e.message; render();
  }
}

function render(){
  const cat = CATEGORIES.find(c=>c.id===state.category);
  document.documentElement.style.setProperty("--cat", cat?.color||"var(--accent)");
  const nav = $("#bn-nav"); nav.innerHTML="";
  CATEGORIES.forEach(c=>{
    nav.append(el("button",{class:"bn-chip"+(c.id===state.category?" active":""),style:c.id===state.category?`background:${c.color}`:"",onclick:()=>{ state.category=c.id; load(); window.scrollTo({top:0,behavior:"smooth"}); }}, c.label));
  });

  const t = $("#bn-ticker"); t.innerHTML="";
  const tArts = state.articles.slice(0,10);
  if(tArts.length){
    const inner = el("div",{class:"bn-ticker-in"});
    [...tArts, ...tArts].forEach(a=> inner.append(el("button",{onclick:()=>openModal(a)}, el("b",{},"●"), a.title)));
    t.append(inner);
  }

  const root = $("#bn-root"); root.innerHTML="";
  if(state.loading){ for(let i=0;i<8;i++) root.append(el("div",{class:"bn-skel"})); return; }
  if(state.error){ root.append(el("div",{class:"bn-status"}, state.error, el("br"), el("button",{onclick:()=>load(true)},"Retry"))); return; }
  let list = state.articles;
  if(state.query){ const q=state.query.toLowerCase(); list = list.filter(a=>(a.title+" "+a.description).toLowerCase().includes(q)); }
  if(!list.length){ root.append(el("div",{class:"bn-status"},"No matching stories.")); return; }

  list.forEach((a,i)=>{
    const isBm = state.bookmarks.some(b=>b.url===a.url);
    const bmBtn = el("button",{class:"bn-card-bookmark"+(isBm?" active":""),onclick:(e)=>{e.stopPropagation();toggleBookmark(a);}}, isBm?"★":"☆");
    root.append(el("article",{class:"bn-card"+(i===0?" bn-featured":""),onclick:()=>openModal(a)},
      el("img",{class:"bn-card-img",src:a.image,alt:"",loading:"lazy",onerror:function(){this.src=fallbackImg(a.id)}}), bmBtn,
      el("div",{class:"bn-card-body"},
        el("div",{class:"bn-card-cat"}, cat?.label||""),
        el("h3",{class:"bn-card-title"}, a.title),
        a.description?el("p",{class:"bn-card-desc"},a.description):null,
        el("div",{class:"bn-card-meta"}, el("span",{},a.source), el("span",{},a.publishedAt?timeAgo(a.publishedAt):""))
      )
    ));
  });
}

function openModal(a){
  const m = $("#bn-modal"); m.innerHTML="";
  const isBm = state.bookmarks.some(b=>b.url===a.url);
  m.append(el("div",{class:"bn-modal-box",onclick:e=>e.stopPropagation()},
    el("img",{src:a.image,alt:"",onerror:function(){this.src=fallbackImg(a.id)}}),
    el("div",{class:"bn-modal-body"},
      el("div",{class:"bn-card-cat"}, a.source+" · "+(a.publishedAt?timeAgo(a.publishedAt):"")),
      el("h2",{}, a.title), a.description?el("p",{},a.description):null, a.content&&a.content!==a.description?el("p",{},a.content):null,
      el("div",{class:"bn-modal-actions"},
        el("a",{class:"bn-btn-primary",href:a.url,target:"_blank"},"Read full article ↗"),
        el("button",{class:"bn-btn-share",onclick:()=>shareArticle(a)},"Share"),
        el("button",{class:"bn-btn-bookmark",onclick:()=>{toggleBookmark(a);closeModal();}},isBm?"★ Bookmarked":"☆ Bookmark"),
        el("button",{class:"bn-btn-ghost",onclick:closeModal},"Close")
      )
    )
  ));
  m.classList.add("show"); m.onclick = closeModal; document.body.style.overflow="hidden";
}
function closeModal(){ $("#bn-modal").classList.remove("show"); document.body.style.overflow=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

$("#bn-q").addEventListener("input", e=>{ state.query=e.target.value; render(); });
$("#bn-country").addEventListener("change", e=>{ state.country=e.target.value; load(); });

window.addEventListener("scroll",()=>{
  const e = document.querySelector(".bn-scrolltop");
  if(window.scrollY>400&&!e) document.body.append(el("button",{class:"bn-scrolltop","aria-label":"Top",onclick:()=>window.scrollTo({top:0,behavior:"smooth"})},"↑"));
  else if(window.scrollY<=400&&e) e.remove();
});

setInterval(()=>{ delete state.cache[state.category+"|"+state.country]; load(true); }, 10*60*1000);

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; $("#bn-install").classList.add("show"); });
$("#bn-install").addEventListener("click", async()=>{ if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $("#bn-install").classList.remove("show"); });

$("#bn-year").textContent = new Date().getFullYear();
render(); load();
</script>
</body>
</html>
